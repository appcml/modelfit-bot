name: 🤖 ModelFit Bot

on:
  schedule:
    - cron: '*/5 * * * *'   # Cada 5 minutos
  workflow_dispatch:          # También manual desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Evita warning de Node.js 20

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🚀 Ejecutar un ciclo del bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_VERIFY_TOKEN: ${{ secrets.META_VERIFY_TOKEN }}
          BOT_NO_DELAY: "true"
        run: python run_cycle.py
