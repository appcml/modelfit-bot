name: 🤖 ModelFit Bot

on:
  # Corre automáticamente cada 5 minutos
  schedule:
    - cron: '*/5 * * * *'

  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4  # Se detiene antes del próximo ciclo de 5 min

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🚀 Ejecutar bot (un ciclo)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_VERIFY_TOKEN: ${{ secrets.META_VERIFY_TOKEN }}
        run: python run_cycle.py
